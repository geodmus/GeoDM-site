<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoDMus Content Studio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #070c0d; color: #fff; font-family: Arial, sans-serif; }

/* NAV */
.nav { background: #0d1517; border-bottom: 1px solid #00c8d4; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 99; flex-wrap: wrap; gap: 8px; }
.nav-title { font-size: 18px; font-weight: 900; letter-spacing: 3px; }
.nav-title span { color: #00c8d4; }
.nav-tabs { display: flex; gap: 4px; }
.nav-tab { padding: 7px 12px; border: none; border-radius: 5px; font-size: 11px; font-weight: 700; cursor: pointer; letter-spacing: 1px; }
.nav-tab.active { background: linear-gradient(135deg, #00c8d4, #cc2d8f); color: #070c0d; }
.nav-tab:not(.active) { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5); }

/* LAYOUT */
.layout { display: flex; height: calc(100vh - 52px); overflow: hidden; }

/* SIDEBAR */
.sidebar { width: 190px; flex-shrink: 0; background: #0d1517; border-right: 1px solid rgba(255,255,255,0.07); overflow-y: auto; padding: 8px; }
.sidebar-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 8px 4px 5px; display: block; }
.side-btn { width: 100%; background: none; border: 1px solid transparent; padding: 7px 8px; text-align: left; cursor: pointer; border-radius: 4px; margin-bottom: 2px; display: flex; align-items: center; gap: 6px; }
.side-btn:hover { background: rgba(255,255,255,0.04); }
.side-btn.active { background: rgba(0,200,212,0.1); border-color: rgba(0,200,212,0.3); }
.side-btn .num { font-size: 9px; color: rgba(255,255,255,0.3); font-family: monospace; width: 14px; flex-shrink: 0; }
.side-btn .lbl { font-size: 10px; color: rgba(255,255,255,0.6); font-weight: 700; line-height: 1.2; }
.side-btn.active .lbl { color: #00c8d4; }
.side-btn .ico { font-size: 10px; margin-left: auto; flex-shrink: 0; }
.done-badge { color: #00c853; font-size: 10px; margin-left: auto; }

/* MAIN */
.main { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 14px; }

/* CARD */
.card-wrap { width: 100%; max-width: 420px; }
.card-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 8px; }

/* MEME CARD */
.meme-card { width: 100%; aspect-ratio: 1; background: #070c0d; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; padding: 6%; border-radius: 6px; }
.meme-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: linear-gradient(180deg, #00c8d4, #cc2d8f); }
.meme-glow { position: absolute; width: 50%; height: 50%; border-radius: 50%; background: radial-gradient(circle, rgba(0,200,212,0.1), transparent 70%); top: -10%; right: -10%; pointer-events: none; }
.meme-tag { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #00c8d4; font-weight: 700; position: relative; z-index: 2; }
.meme-body { position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 5% 0; }
.meme-setup { font-size: 12px; color: rgba(255,255,255,0.45); font-style: italic; line-height: 1.5; margin-bottom: 5%; }
.meme-punch { font-size: clamp(28px, 7vw, 44px); font-weight: 900; line-height: 0.95; text-transform: uppercase; }
.meme-foot { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: center; }
.meme-handle { font-size: 9px; color: rgba(255,255,255,0.2); font-family: monospace; }
.meme-brand { font-size: 12px; font-weight: 900; letter-spacing: 3px; background: linear-gradient(90deg, #00c8d4, #cc2d8f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.cc { color: #00c8d4; }
.cm { color: #cc2d8f; }
.cy { color: #f5c842; }

/* INFO CARD */
.info-card { width: 100%; aspect-ratio: 1; background: #070c0d; position: relative; overflow: hidden; display: flex; flex-direction: column; padding: 5%; border-radius: 6px; }
.info-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
.info-cat { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 3px; }
.info-title { font-size: clamp(16px, 4vw, 24px); font-weight: 900; color: #fff; line-height: 1; margin-bottom: 3px; text-transform: uppercase; }
.info-sub { font-size: 9px; color: rgba(255,255,255,0.35); margin-bottom: 10px; }
.bars { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 5px; }
.bar-row { display: flex; align-items: center; gap: 6px; }
.bar-lbl { font-size: 9px; color: rgba(255,255,255,0.55); width: 36%; flex-shrink: 0; font-weight: 600; }
.bar-track { flex: 1; height: 18px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; display: flex; align-items: center; justify-content: flex-end; padding-right: 5px; }
.bar-fill span { font-size: 8px; font-weight: 700; color: #fff; font-family: monospace; }
.info-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding-top: 7px; border-top: 1px solid rgba(255,255,255,0.05); }
.info-src { font-size: 7px; color: rgba(255,255,255,0.18); }
.info-brand { font-size: 11px; font-weight: 900; letter-spacing: 3px; background: linear-gradient(90deg, #00c8d4, #cc2d8f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* REEL CARD */
.reel-wrap { display: flex; justify-content: center; }
.reel-card { width: 55%; aspect-ratio: 9/16; background: #070c0d; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; padding: 6% 5%; border-radius: 6px; }
.reel-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0,200,212,0.08), transparent 60%); pointer-events: none; }
.reel-side { position: absolute; right: 0; top: 0; bottom: 0; width: 3px; background: linear-gradient(180deg, #00c8d4, #cc2d8f); }
.reel-ep { font-size: 7px; color: #00c8d4; letter-spacing: 2px; margin-bottom: 6px; font-family: monospace; position: relative; z-index: 2; display: flex; align-items: center; gap: 4px; }
.reel-dot { width: 5px; height: 5px; border-radius: 50%; background: #00c8d4; animation: blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.reel-ser { font-size: 7px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 5px; position: relative; z-index: 2; }
.reel-hook { font-size: clamp(22px, 6vw, 36px); font-weight: 900; line-height: 0.93; text-transform: uppercase; position: relative; z-index: 2; margin-bottom: 6px; }
.reel-sub { font-size: 10px; color: rgba(255,255,255,0.4); line-height: 1.4; position: relative; z-index: 2; }
.reel-mid { display: flex; align-items: center; justify-content: center; flex: 1; position: relative; z-index: 2; }
.reel-emi { font-size: clamp(40px, 10vw, 56px); }
.reel-badge { position: absolute; right: 0; top: 0; background: linear-gradient(135deg, #00c8d4, #cc2d8f); color: #070c0d; padding: 3px 7px; border-radius: 2px; font-size: 7px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.reel-cta { background: linear-gradient(135deg, #00c8d4, #cc2d8f); color: #070c0d; padding: 6% 4%; border-radius: 3px; font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; text-align: center; margin-bottom: 5px; position: relative; z-index: 2; }
.reel-foot { display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 2; }
.reel-handle { font-size: 7px; color: rgba(255,255,255,0.2); font-family: monospace; }
.reel-brand { font-size: 9px; font-weight: 900; letter-spacing: 3px; background: linear-gradient(90deg, #00c8d4, #cc2d8f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* HOT CARD */
.hot-card { width: 100%; aspect-ratio: 1; background: #000; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; padding: 8%; border-radius: 6px; }
.hot-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: linear-gradient(180deg, #00c8d4, #cc2d8f); }
.hot-line { font-size: clamp(16px, 4vw, 24px); font-weight: 900; line-height: 1.2; margin-bottom: 2%; color: #fff; }
.hot-divider { width: 40px; height: 2px; background: linear-gradient(90deg, #00c8d4, #cc2d8f); margin: 4% 0; }
.hot-tag { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); }
.hot-brand { position: absolute; bottom: 5%; right: 5%; font-size: 11px; font-weight: 900; letter-spacing: 3px; background: linear-gradient(90deg, #00c8d4, #cc2d8f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* EMPTY STATE */
.empty { width: 100%; max-width: 420px; height: 280px; background: #0d1517; border: 1px dashed rgba(0,200,212,0.2); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
.empty-icon { font-size: 36px; }
.empty-text { font-size: 12px; color: rgba(255,255,255,0.35); text-align: center; line-height: 1.6; }

/* CAPTION */
.caption-wrap { width: 100%; max-width: 420px; background: #0d1517; border: 1px solid rgba(0,200,212,0.1); border-radius: 8px; padding: 14px; }
.cap-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.cap-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #cc2d8f; font-weight: 700; }
.cap-chars { font-size: 9px; color: rgba(255,255,255,0.3); font-family: monospace; }
.cap-textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.07); color: #fff; padding: 10px 12px; font-size: 12px; font-family: Arial, sans-serif; border-radius: 5px; outline: none; resize: vertical; line-height: 1.65; min-height: 130px; }
.cap-btns { display: flex; gap: 8px; margin-top: 10px; }
.cap-btn { flex: 1; padding: 11px; border: none; border-radius: 5px; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; }
.cap-btn.primary { background: linear-gradient(135deg, #00c8d4, #cc2d8f); color: #070c0d; }
.cap-btn.secondary { background: none; border: 1px solid rgba(0,200,212,0.3); color: #00c8d4; }
.cap-btn.copied { background: #00c853; color: #070c0d; }

/* PLATFORM TAGS */
.ptags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.ptag { padding: 3px 9px; border-radius: 8px; font-size: 8px; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; }
.ptag-ig { background: rgba(204,45,143,0.1); border: 1px solid rgba(204,45,143,0.2); color: #cc2d8f; }
.ptag-x { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.45); }

/* PROGRESS */
.prog-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0d1517; border-top: 1px solid rgba(255,255,255,0.06); padding: 8px 16px; display: flex; align-items: center; gap: 10px; z-index: 99; }
.prog-track { flex: 1; height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, #00c8d4, #cc2d8f); border-radius: 3px; transition: width 0.4s; }
.prog-text { font-size: 10px; color: rgba(255,255,255,0.4); font-family: monospace; white-space: nowrap; }

/* MARK DONE BUTTON */
.mark-btn { display: flex; gap: 7px; width: 100%; max-width: 420px; }
.mark-btn button { flex: 1; padding: 9px; border-radius: 5px; font-size: 10px; font-weight: 700; cursor: pointer; letter-spacing: 1px; }
.btn-back { background: none; border: 1px solid rgba(0,200,212,0.25); color: #00c8d4; }
.btn-post { border: none; color: #070c0d; }


/* CHART TYPE SWITCHER */
.chart-switcher { display: flex; gap: 4px; margin-bottom: 10px; }
.chart-sw-btn { padding: 5px 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.45); font-size: 10px; font-weight: 700; border-radius: 4px; cursor: pointer; letter-spacing: 1px; }
.chart-sw-btn.active { background: rgba(0,200,212,0.12); border-color: #00c8d4; color: #00c8d4; }

/* PIE CHART */
.pie-wrap { display: flex; align-items: center; justify-content: center; gap: 16px; height: 100%; }
.pie-legend { display: flex; flex-direction: column; gap: 7px; }
.pie-item { display: flex; align-items: center; gap: 6px; }
.pie-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.pie-text { font-size: 11px; color: rgba(255,255,255,0.6); }
.pie-text strong { color: #fff; font-size: 13px; }

/* STAT HERO */
.stat-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; gap: 8px; }
.stat-num { font-size: clamp(72px, 18vw, 100px); font-weight: 900; line-height: 0.85; background: linear-gradient(135deg, #00c8d4, #cc2d8f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-label { font-size: clamp(13px, 3vw, 16px); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #fff; max-width: 260px; line-height: 1.3; }
.stat-desc { font-size: 11px; color: rgba(255,255,255,0.4); max-width: 270px; line-height: 1.6; }
.stat-pill { background: rgba(0,200,83,0.1); border: 1px solid rgba(0,200,83,0.2); border-radius: 16px; padding: 4px 12px; margin-top: 4px; }
.stat-pill span { font-size: 10px; font-weight: 700; color: #00c853; }

/* TOAST */
.toast { position: fixed; top: 65px; left: 50%; transform: translateX(-50%) translateY(-10px); background: linear-gradient(135deg, #00c8d4, #cc2d8f); color: #070c0d; padding: 9px 20px; border-radius: 20px; font-size: 11px; font-weight: 700; z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 480px) { .sidebar { display: none; } }
</style>
</head>

// HELPERS
function getData(type, idx) {
  if (type === "meme") return MEMES[idx];
  if (type === "info") return INFOS[idx];
  if (type === "reel") return REELS[idx];
  return HOTS[idx];
}
function getCap(type, idx) {
  var arr = CAPS[type];
  return arr && arr[idx] ? arr[idx] : "#GeoDMus #Chicago #DigitalMarketing";
}
function typeEmoji(t) { return {meme:"😂",info:"📊",reel:"🎬",hot:"🔥"}[t] || ""; }
function getLabel(type, idx) {
  var d = getData(type, idx);
  if (!d) return "";
  if (type === "meme") return d.tag;
  if (type === "info") return d.cat;
  if (type === "reel") return d.ser;
  return d.tag || (d.lines[0] ? d.lines[0].t.slice(0,20) : "");
}

// RENDER CARDS
function renderMeme(d) {
  var punches = "";
  for (var i = 0; i < d.lines.length; i++) {
    punches += '<div style="color:' + d.lines[i].c + '">' + d.lines[i].t + '</div>';
  }
  return '<div class="meme-card">'
    + '<div class="meme-accent"></div>'
    + '<div class="meme-glow"></div>'
    + '<div class="meme-tag">' + d.tag + '</div>'
    + '<div class="meme-body">'
    + '<div class="meme-setup">' + d.setup + '</div>'
    + '<div class="meme-punch">' + punches + '</div>'
    + '</div>'
    + '<div class="meme-foot">'
    + '<div class="meme-handle">@geodm.us</div>'
    + '<div class="meme-brand">GEODMus</div>'
    + '</div></div>';
}


function renderPie(d) {
  var total = 0;
  for (var i = 0; i < d.bars.length; i++) total += d.bars[i].p;
  var angle = -90;
  var r = 65, cx = 75, cy = 75;
  var paths = "", legend = "";
  var bars = d.bars.slice(0, 5);
  for (var i = 0; i < bars.length; i++) {
    var b = bars[i];
    var pct = b.p / total;
    var sweep = pct * 360;
    var x1 = cx + r * Math.cos(angle * Math.PI / 180);
    var y1 = cy + r * Math.sin(angle * Math.PI / 180);
    angle += sweep;
    var x2 = cx + r * Math.cos(angle * Math.PI / 180);
    var y2 = cy + r * Math.sin(angle * Math.PI / 180);
    var lg = sweep > 180 ? 1 : 0;
    paths += '<path d="M'+cx+','+cy+' L'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+r+','+r+' 0 '+lg+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+' Z" fill="'+b.c+'"/>';
    legend += '<div class="pie-item"><div class="pie-dot" style="background:'+b.c+'"></div><div class="pie-text"><strong>'+b.p+'%</strong> '+b.l+'</div></div>';
  }
  return '<div class="pie-wrap">'
    + '<svg width="150" height="150" viewBox="0 0 150 150">'
    + paths
    + '<circle cx="'+cx+'" cy="'+cy+'" r="28" fill="#070c0d"/>'
    + '<text x="'+cx+'" y="'+(cy-3)+'" text-anchor="middle" font-size="15" fill="'+d.color+'" font-weight="700">'+bars[0].p+'%</text>'
    + '<text x="'+cx+'" y="'+(cy+10)+'" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.4)">'+bars[0].l.split(' ')[0].toUpperCase()+'</text>'
    + '</svg>'
    + '<div class="pie-legend">'+legend+'</div>'
    + '</div>';
}

function renderStat(d) {
  return '<div class="stat-wrap">'
    + '<div class="stat-num">'+d.bars[0].p+'%</div>'
    + '<div class="stat-label">'+d.bars[0].l+'</div>'
    + '<div class="stat-desc">'+d.sub+'</div>'
    + '<div class="stat-pill"><span>↑ Source: '+d.src+'</span></div>'
    + '</div>';
}

function renderInfo(d) {
  var chartHtml = "";
  if (curChartType === "bar") {
    var bars = "";
    for (var i = 0; i < d.bars.length; i++) {
      var b = d.bars[i];
      bars += '<div class="bar-row">'
        + '<div class="bar-lbl">' + b.l + '</div>'
        + '<div class="bar-track"><div class="bar-fill" style="width:' + b.p + '%;background:' + b.c + '"><span>' + b.p + '%</span></div></div>'
        + '</div>';
    }
    chartHtml = '<div class="bars">' + bars + '</div>';
  } else if (curChartType === "pie") {
    chartHtml = renderPie(d);
  } else {
    chartHtml = renderStat(d);
  }
  var sw = '<div class="chart-switcher">'
    + '<button class="chart-sw-btn' + (curChartType==="bar"?" active":"") + '" data-chart="bar">📊 Bar</button>'
    + '<button class="chart-sw-btn' + (curChartType==="pie"?" active":"") + '" data-chart="pie">🥧 Pie</button>'
    + '<button class="chart-sw-btn' + (curChartType==="stat"?" active":"") + '" data-chart="stat">💥 Stat</button>'
    + '</div>';
  return '<div class="info-card">'
    + '<div class="info-accent" style="background:' + d.color + '"></div>'
    + '<div class="info-cat" style="color:' + d.color + '">' + d.cat + '</div>'
    + '<div class="info-title">' + d.title + '</div>'
    + sw
    + chartHtml
    + '<div class="info-foot"><div class="info-src">Source: ' + d.src + '</div><div class="info-brand">GEODMus</div></div>'
    + '</div>';
}

function renderReel(d) {
  var hook = "";
  for (var i = 0; i < d.hook.length; i++) {
    hook += '<div style="color:' + (d.hook[i].c || "#fff") + '">' + d.hook[i].t + '</div>';
  }
  return '<div class="reel-wrap"><div class="reel-card">'
    + '<div class="reel-bg"></div>'
    + '<div class="reel-side"></div>'
    + '<div>'
    + '<div class="reel-ep"><div class="reel-dot"></div>' + d.ep + '</div>'
    + '<div class="reel-ser">' + d.ser + '</div>'
    + '<div class="reel-hook">' + hook + '</div>'
    + '<div class="reel-sub">' + d.sub + '</div>'
    + '</div>'
    + '<div class="reel-mid"><div class="reel-emi">' + d.emi + '</div><div class="reel-badge">' + d.bdg + '</div></div>'
    + '<div><div class="reel-cta">' + d.cta + '</div>'
    + '<div class="reel-foot"><div class="reel-handle">@geodm.us</div><div class="reel-brand">GEODMus</div></div>'
    + '</div></div></div>';
}

function renderHot(d) {
  var lines = "";
  for (var i = 0; i < d.lines.length; i++) {
    lines += '<div class="hot-line" style="color:' + (d.lines[i].c || "#fff") + '">' + d.lines[i].t + '</div>';

  return '<div class="hot-card">'
    + '<div class="hot-accent"></div>'
    + lines
    + '<div class="hot-divider"></div>'

    + '<div class="hot-brand">GEODMus</div>'

}

function showCard(type, idx) {
  if (type !== "info") curChartType = "bar";
  var d = getData(type, idx);
  var html = "";
  if (type === "meme") html = renderMeme(d);
  else if (type === "info") html = renderInfo(d);
  else if (type === "reel") html = renderReel(d);
  else html = renderHot(d);
  document.getElementById("card-display").innerHTML = html;
}

function showCaption(type, idx, pl) {
  var cap = getCap(type, idx);
  var ta = document.getElementById("cap-text");
  ta.value = cap;
  document.getElementById("cap-chars").textContent = cap.length + " chars";
  var ptags = "";
  if (pl) {
    for (var i = 0; i < pl.length; i++) {
      if (pl[i] === "IG") ptags += '<span class="ptag ptag-ig">📸 Instagram</span>';
      if (pl[i] === "X") ptags += '<span class="ptag ptag-x">🐦 X / Twitter</span>';
    }
  }
  document.getElementById("ptags").innerHTML = ptags;
}

function selectDay(day) {
  var entry = null;
  for (var i = 0; i < CAL.length; i++) { if (CAL[i].day === day) { entry = CAL[i]; break; } }
  if (!entry) return;
  curSel = entry;
  document.getElementById("card-label").textContent = "Day " + day + " — " + getLabel(entry.type, entry.idx) + " · " + entry.time;
  showCard(entry.type, entry.idx);
  showCaption(entry.type, entry.idx, entry.pl);
  var ar = document.getElementById("action-row");
  ar.style.display = "flex";
  var bp = document.getElementById("btn-post");
  bp.textContent = doneMap[day] ? "✅ Posted!" : "Mark as Posted";
  bp.style.background = doneMap[day] ? G : "linear-gradient(135deg," + C + "," + M + ")";
  buildSidebar();
  document.getElementById("main").scrollTop = 0;
}

function selectItem(type, idx) {
  curSel = {type:type, idx:idx, pl: type==="reel" ? ["IG"] : ["IG","X"]};
  document.getElementById("card-label").textContent = typeEmoji(type) + " " + getLabel(type, idx);
  showCard(type, idx);
  showCaption(type, idx, curSel.pl);
  document.getElementById("action-row").style.display = "none";
  buildSidebar();
  document.getElementById("main").scrollTop = 0;
}

function buildSidebar() {
  var sb = document.getElementById("sidebar");
  var html = "";
  if (curTab === "cal") {
    html += '<span class="sidebar-label">30-Day Calendar</span>';
    for (var i = 0; i < CAL.length; i++) {
      var e = CAL[i];
      var on = (curSel && curSel.day === e.day) ? " active" : "";
      var isDone = doneMap[e.day] ? '<span class="done-badge">✅</span>' : "";
      html += '<button class="side-btn' + on + '" data-day="' + e.day + '">'
        + '<span class="num">' + e.day + '</span>'
        + '<span class="lbl">' + e.label + '</span>'
        + '<span class="ico">' + typeEmoji(e.type) + '</span>'
        + isDone
        + '</button>';
    }
  } else {
    var list = curTab === "meme" ? MEMES : curTab === "info" ? INFOS : curTab === "reel" ? REELS : HOTS;
    html += '<span class="sidebar-label">' + typeEmoji(curTab) + ' ' + list.length + ' posts</span>';
    for (var j = 0; j < list.length; j++) {
      var on2 = (curSel && curSel.type === curTab && curSel.idx === j) ? " active" : "";
      html += '<button class="side-btn' + on2 + '" data-type="' + curTab + '" data-idx="' + j + '">'
        + '<span class="num">' + (j+1) + '</span>'
        + '<span class="lbl">' + getLabel(curTab, j) + '</span>'
        + '</button>';
    }
  }
  sb.innerHTML = html;
}

function updateProgress() {
  var count = 0;
  for (var k in doneMap) { if (doneMap[k]) count++; }
  var pct = Math.round((count / 30) * 100);
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-text").textContent = count + "/30 posted";
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show";
  setTimeout(function() { t.className = "toast"; }, 2500);
}

});

document.getElementById("btn-copy").addEventListener("click", function() {
  var text = document.getElementById("cap-text").value;
  if (!text.trim()) { showToast("No caption loaded yet!"); return; }
  var self = this;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      self.textContent = "✅ Copied!";
      self.classList.add("copied");
      showToast("Caption copied! Paste into Metricool.");
      setTimeout(function() {
        self.textContent = "📋 Copy Caption";
        self.classList.remove("copied");
      }, 2000);
    });
  } else {
    document.getElementById("cap-text").select();
    document.execCommand("copy");
    showToast("Copied! Paste into Metricool.");
  }
});
