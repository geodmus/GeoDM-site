<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>GeoDMus Content Studio</title>

<style>
:root{--c:#00c8d4;--m:#cc2d8f;--d:#070c0d;--d2:#0d1517;--w:#fff;--g:rgba(255,255,255,0.4);--y:#f5c842;--o:#f7931a;--gr:#00c853}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--d);color:var(--w);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;touch-action:manipulation}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(7,12,13,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,200,212,0.15);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
#nav h1{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:16px;letter-spacing:3px;background:linear-gradient(90deg,var(--c),var(--m));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.tabs{display:flex;gap:3px;flex:1;justify-content:flex-end}
.tab{padding:7px 11px;border:none;border-radius:5px;font-family:'Arial Narrow',Arial,sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab.on{background:linear-gradient(135deg,var(--c),var(--m));color:var(--d)}
.tab:not(.on){background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5)}

/* MAIN LAYOUT */
#main{position:fixed;top:52px;bottom:0;left:0;right:0;display:flex;overflow:hidden}

/* SIDEBAR */
#sidebar{width:200px;flex-shrink:0;overflow-y:auto;background:var(--d2);border-right:1px solid rgba(255,255,255,0.06);padding:10px 8px}
#sidebar::-webkit-scrollbar{width:3px}
#sidebar::-webkit-scrollbar-thumb{background:rgba(0,200,212,0.3);border-radius:2px}
.s-label{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);padding:8px 4px 4px;display:block}
.s-btn{width:100%;background:none;border:none;padding:7px 8px;text-align:left;cursor:pointer;border-radius:4px;margin-bottom:2px;transition:all .15s;border:1px solid transparent;display:flex;align-items:center;gap:7px}
.s-btn:hover{background:rgba(255,255,255,0.04)}
.s-btn.on{background:rgba(0,200,212,0.1);border-color:rgba(0,200,212,0.3)}
.s-num{font-family:'Courier New',Courier,monospace;font-size:8px;color:rgba(255,255,255,0.25);width:16px;flex-shrink:0}
.s-lbl{font-size:10px;color:rgba(255,255,255,0.6);font-weight:700;line-height:1.2}
.s-btn.on .s-lbl{color:var(--c)}
.s-done{margin-left:auto;font-size:9px}
.s-type{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;flex-shrink:0}
.s-type.meme{background:rgba(204,45,143,0.15);color:var(--m)}
.s-type.info{background:rgba(0,200,212,0.12);color:var(--c)}
.s-type.reel{background:rgba(245,200,66,0.12);color:var(--y)}
.s-type.hot{background:rgba(247,147,26,0.12);color:var(--o)}

/* CONTENT AREA */
#content{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:16px 12px 100px}
#content::-webkit-scrollbar{width:3px}
#content::-webkit-scrollbar-thumb{background:rgba(0,200,212,0.2);border-radius:2px}

/* CARD WRAPPER - FULL SIZE */
#card-wrap{width:100%;max-width:440px;position:relative}
.card-label{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.card-label::before{content:'';width:12px;height:2px;background:var(--c)}

/* MEME CARD */
.meme-card{width:100%;aspect-ratio:1;background:var(--d);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;padding:5%}
.m-glow1{position:absolute;width:55%;height:55%;border-radius:50%;background:radial-gradient(circle,rgba(0,200,212,0.12),transparent 70%);top:-10%;right:-10%;pointer-events:none}
.m-glow2{position:absolute;width:40%;height:40%;border-radius:50%;background:radial-gradient(circle,rgba(204,45,143,0.1),transparent 70%);bottom:-8%;left:-6%;pointer-events:none}
.m-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,200,212,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,212,0.022) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.m-accent{position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--c),var(--m))}
.m-tag{position:relative;z-index:2;font-family:'Arial Narrow',Arial,sans-serif;font-size:clamp(8px,1.8vw,11px);letter-spacing:3px;text-transform:uppercase;color:var(--c);font-weight:700;display:flex;align-items:center;gap:8px}
.m-tag::before{content:'';width:14px;height:2px;background:var(--c);flex-shrink:0}
.m-body{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;padding:4% 0}
.m-setup{font-size:clamp(11px,2.5vw,15px);color:rgba(255,255,255,0.45);line-height:1.5;margin-bottom:4%;font-style:italic}
.m-punch{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:clamp(32px,8vw,52px);line-height:.92;letter-spacing:1px}
.m-foot{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:center}
.m-handle{font-family:'Courier New',Courier,monospace;font-size:clamp(7px,1.5vw,10px);color:rgba(255,255,255,0.2)}
.m-brand{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:clamp(10px,2.2vw,15px);letter-spacing:3px;background:linear-gradient(90deg,var(--c),var(--m));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* INFO CARD */
.info-card{width:100%;aspect-ratio:1;background:var(--d);position:relative;overflow:hidden;display:flex;flex-direction:column;padding:5% 5% 3%}
.i-accent{position:absolute;left:0;top:0;bottom:0;width:4px}
.i-glow{position:absolute;width:45%;height:45%;border-radius:50%;background:radial-gradient(circle,rgba(0,200,212,0.07),transparent 70%);top:-10%;right:-10%;pointer-events:none}
.i-cat{font-family:'Arial Narrow',Arial,sans-serif;font-size:clamp(8px,1.8vw,11px);letter-spacing:3px;text-transform:uppercase;font-weight:700;margin-bottom:2%}
.i-title{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:clamp(18px,4.5vw,30px);color:var(--w);line-height:.98;margin-bottom:1.5%}
.i-sub{font-size:clamp(8px,1.8vw,11px);color:rgba(255,255,255,0.35);line-height:1.4;margin-bottom:3%}
.i-chart{flex:1;display:flex;flex-direction:column;justify-content:center;gap:2%}
.bar-row{display:flex;align-items:center;gap:6px}
.bar-lbl{font-size:clamp(8px,1.8vw,11px);color:rgba(255,255,255,0.55);width:38%;flex-shrink:0;line-height:1.2;font-weight:600}
.bar-track{flex:1;height:clamp(14px,3.5vw,22px);background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;transition:width .6s ease}
.bar-pct{font-size:clamp(7px,1.6vw,10px);font-weight:700;color:var(--w);font-family:'Courier New',Courier,monospace}
.i-foot{display:flex;justify-content:space-between;align-items:center;margin-top:3%;padding-top:3%;border-top:1px solid rgba(255,255,255,0.06)}
.i-src{font-size:clamp(6px,1.3vw,8px);color:rgba(255,255,255,0.18)}
.i-brand{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:clamp(10px,2.2vw,14px);letter-spacing:3px;background:linear-gradient(90deg,var(--c),var(--m));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* REEL CARD */
.reel-card{width:56%;aspect-ratio:9/16;background:var(--d);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;padding:6% 5%}
.r-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(0,200,212,0.09),transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(204,45,143,0.09),transparent 60%),var(--d);pointer-events:none}
.r-scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,200,212,0.012) 3px,rgba(0,200,212,0.012) 4px);pointer-events:none}
.r-side{position:absolute;right:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--c),var(--m))}
.r-ep{font-family:'Courier New',Courier,monospace;font-size:clamp(7px,1.5vw,9px);color:var(--c);letter-spacing:2px;margin-bottom:5%;display:flex;align-items:center;gap:5px;position:relative;z-index:2}
.r-dot{width:5px;height:5px;border-radius:50%;background:var(--c);animation:blink 1.5s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.r-ser{font-family:'Arial Narrow',Arial,sans-serif;font-size:clamp(7px,1.5vw,9px);letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:4%;position:relative;z-index:2}
.r-hook{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:clamp(24px,7vw,44px);line-height:.91;position:relative;z-index:2;margin-bottom:5%}
.r-sub{font-size:clamp(9px,2vw,12px);color:rgba(255,255,255,0.42);line-height:1.45;position:relative;z-index:2}
.r-mid{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;flex:1}
.r-emi{font-size:clamp(36px,10vw,60px);filter:drop-shadow(0 0 16px rgba(0,200,212,0.3))}
.r-badge{position:absolute;right:0;top:0;background:linear-gradient(135deg,var(--c),var(--m));color:var(--d);padding:3px 8px;border-radius:2px;font-family:'Arial Narrow',Arial,sans-serif;font-size:clamp(7px,1.5vw,9px);letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
.r-cta{background:linear-gradient(135deg,var(--c),var(--m));color:var(--d);padding:5% 4%;border-radius:3px;font-family:'Arial Narrow',Arial,sans-serif;font-size:clamp(9px,2vw,12px);letter-spacing:2px;text-transform:uppercase;font-weight:700;text-align:center;margin-bottom:4%;position:relative;z-index:2}
.r-foot{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
.r-handle{font-family:'Courier New',Courier,monospace;font-size:clamp(6px,1.3vw,8px);color:rgba(255,255,255,0.2)}
.r-brand{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:clamp(9px,2vw,12px);letter-spacing:3px;background:linear-gradient(90deg,var(--c),var(--m));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* HOT TAKE CARD */
.hot-card{width:100%;aspect-ratio:1;background:#000;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:8%}
.hot-lines{position:relative;z-index:2}
.hot-line{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:900;font-size:clamp(16px,4.2vw,26px);color:var(--w);line-height:1.2;margin-bottom:1.5%}
.hot-line.hl-c{color:var(--c)}
.hot-line.hl-m{color:var(--m)}
.hot-line.hl-y{color:var(--y)}
.hot-line.hl-dim{color:rgba(255,255,255,0.45);font-weight:700}
.hot-divider{width:40px;height:2px;background:linear-gradient(90deg,var(--c),var(--m));margin:4% 0}
.hot-tag{font-family:'Arial Narrow',Arial,sans-serif;font-size:clamp(9px,2vw,12px);letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.3);position:relative;z-index:2}
.hot-brand{position:absolute;bottom:5%;right:5%;font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:clamp(11px,2.5vw,16px);letter-spacing:3px;background:linear-gradient(90deg,var(--c),var(--m));-webkit-background-clip:text;-webkit-text-fill-color:transparent;z-index:2}
.hot-accent{position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--c),var(--m))}

/* CAPTION AREA */
#cap-area{width:100%;max-width:440px;margin-top:14px}
.cap-box{background:var(--d2);border:1px solid rgba(0,200,212,0.1);border-radius:8px;padding:14px}
.cap-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cap-title{font-family:'Arial Narrow',Arial,sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--m)}
.cap-chars{font-size:9px;color:rgba(255,255,255,0.3);font-family:'Courier New',Courier,monospace}
#cap-text{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.07);color:var(--w);padding:10px 12px;font-size:12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;border-radius:5px;outline:none;resize:vertical;line-height:1.65;min-height:120px}
.cap-btns{display:flex;gap:8px;margin-top:10px}
.cbtn{flex:1;padding:11px;border:none;border-radius:5px;font-family:'Arial Narrow',Arial,sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;cursor:pointer;transition:all .2s}
.cbtn.primary{background:linear-gradient(135deg,var(--c),var(--m));color:var(--d)}
.cbtn.secondary{background:none;border:1px solid rgba(0,200,212,0.3);color:var(--c)}
.cbtn.done{background:var(--gr);color:var(--d)}

/* PLATFORM TAGS */
.ptags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.ptag{padding:3px 9px;border-radius:8px;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
.ptag.ig{background:rgba(204,45,143,0.1);border:1px solid rgba(204,45,143,0.2);color:var(--m)}
.ptag.x{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.45)}

/* PROGRESS BAR */
#prog-bar{position:fixed;bottom:0;left:0;right:0;background:var(--d2);border-top:1px solid rgba(255,255,255,0.06);padding:10px 14px;display:flex;align-items:center;gap:10px;z-index:100}
.prog-track{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--c),var(--m));border-radius:3px;transition:width .4s}
#prog-text{font-size:10px;color:rgba(255,255,255,0.4);font-family:'Courier New',Courier,monospace;white-space:nowrap}

/* TOAST */
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);background:linear-gradient(135deg,var(--c),var(--m));color:var(--d);padding:9px 18px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* COLORS */
.cc{color:var(--c)}.cm{color:var(--m)}.cy{color:var(--y)}.co{color:var(--o)}

/* MOBILE */
@media(max-width:600px){
  #sidebar{width:160px}
  .tab{padding:6px 8px;font-size:9px}
}
@media(max-width:480px){
  #sidebar{display:none}
  #content{padding:12px 10px 100px}
}
</style>
</head>
<body>

<div id="toast"></div>

<!-- NAV -->
<div id="nav">
  <h1>GDM STUDIO</h1>
  <div class="tabs">
    <button class="tab on" data-tab="cal">📅 Cal</button>
    <button class="tab" data-tab="meme">😂 Meme</button>
    <button class="tab" data-tab="info">📊 Data</button>
    <button class="tab" data-tab="reel">🎬 Reel</button>
    <button class="tab" data-tab="hot">🔥 Hot</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <!-- SIDEBAR -->
  <div id="sidebar"></div>

  <!-- CONTENT -->
  <div id="content">
    <div id="card-wrap">
      <div class="card-label" id="card-label">Select a post from sidebar</div>
      <div id="card-display"></div>
    </div>
    <div id="cap-area">
      <div class="cap-box">
        <div class="cap-head">
          <div class="cap-title">Caption Editor</div>
          <div class="cap-chars" id="char-count">0 chars</div>
        </div>
        <textarea id="cap-text" placeholder="Select a post to load its caption..." oninput="updateChars()"></textarea>
        <div class="cap-btns">
          <button class="cbtn primary" id="copy-btn" onclick="copyCaption()">📋 Copy Caption</button>
          <button class="cbtn secondary" onclick="openMetricool()">Open Metricool →</button>
        </div>
        <div class="ptags" id="ptags"></div>
      </div>
    </div>
  </div>
</div>

<!-- PROGRESS -->
<div id="prog-bar">
  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div id="prog-text">0/30 posted</div>
</div>

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let curTab = 'cal';
let curSel = null;
let done = JSON.parse(localStorage.getItem('gdm-done')||'{}');

function saveDone(){localStorage.setItem('gdm-done',JSON.stringify(done));}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════

function switchTab(tab){
  curTab = tab;
  buildSidebar();
  if(tab!=='cal') showFirst(tab);
  else clearCard();
}

function typeLabel(type){
  return {meme:'😂',info:'📊',reel:'🎬',hot:'🔥'}[type]||'';
}

function typeClass(type){return type;}

function buildSidebar(){
  const sb = document.getElementById('sidebar');
  if(curTab==='cal'){
    let out = '<span class="s-label">30-Day Calendar</span>';
    CAL.forEach(function(e){
      const lbl = getLabel(e.type,e.idx);
      const isDone = done[e.day];
      const on = (curSel&&curSel.day===e.day)?' on':'';
      out += '<button class="s-btn'+on+'" data-action="cal" data-day="'+e.day+'">'
           + '<span class="s-num">'+e.day+'</span>'
           + '<span class="s-lbl">'+lbl.slice(0,18)+'</span>'
           + '<span class="s-type '+typeClass(e.type)+'">'+typeLabel(e.type)+'</span>'
           + (isDone?'<span class="s-done">✅</span>':'')
           + '</button>';
    });
    sb.innerHTML = out;
  } else {
    const items = getList(curTab);
    let out = '<span class="s-label">'+typeLabel(curTab)+' '+curTab.charAt(0).toUpperCase()+curTab.slice(1)+'s ('+items.length+')</span>';
    items.forEach(function(d,i){
      const lbl = getLabel(curTab,i);
      const on = (curSel&&curSel.type===curTab&&curSel.idx===i)?' on':'';
      out += '<button class="s-btn'+on+'" data-action="item" data-type="'+curTab+'" data-idx="'+i+'">'
           + '<span class="s-num">'+(i+1)+'</span>'
           + '<span class="s-lbl">'+lbl.slice(0,20)+'</span>'
           + '</button>';
    });
    sb.innerHTML = out;
  }
  // Delegated listener
  sb.onclick = function(ev){
    var btn = ev.target.closest('[data-action]');
    if(!btn) return;
    if(btn.dataset.action==='cal') selectCal(parseInt(btn.dataset.day));
    else if(btn.dataset.action==='item') selectItem(btn.dataset.type, parseInt(btn.dataset.idx));
  };
  updateProgress();
}

function getList(type){
  return {meme:MEMES,info:INFOS,reel:REELS,hot:HOTS}[type]||[];
}

function getData(type,idx){
  return getList(type)[idx];
}

function getLabel(type,idx){
  const d = getData(type,idx);
  if(!d) return '';
  if(type==='meme') return d.tag;
  if(type==='info') return d.title;
  if(type==='reel') return d.ser;
  if(type==='hot') return d.tag||d.lines[0].t.slice(0,20);
  return '';
}

function selectCal(day){
  const e = CAL.find(c=>c.day===day);
  curSel = {day,type:e.type,idx:e.idx,pl:e.pl,time:e.time};
  renderCard(e.type,e.idx);
  loadCap(e.type,e.idx);
  setPtags(e.pl);
  document.getElementById('card-label').textContent = `Day ${day} — ${getLabel(e.type,e.idx)} · ${e.time}`;
  buildSidebar();
}

function selectItem(type,idx){
  curSel = {type,idx,pl:type==='reel'?['IG']:['IG','X']};
  renderCard(type,idx);
  loadCap(type,idx);
  setPtags(curSel.pl);
  document.getElementById('card-label').textContent = `${typeLabel(type)} ${getLabel(type,idx)}`;
  buildSidebar();
}

function showFirst(type){
  selectItem(type,0);
}

function clearCard(){
  curSel = null;
  document.getElementById('card-display').innerHTML = '<div style="height:200px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.2);font-size:13px;">Select a post from sidebar</div>';
  document.getElementById('cap-text').value = '';
  document.getElementById('char-count').textContent = '0 chars';
  document.getElementById('ptags').innerHTML = '';
  buildSidebar();
}

function renderCard(type,idx){
  const d = getData(type,idx);
  let html = '';
  if(type==='meme') html = renderMeme(d);
  else if(type==='info') html = renderInfo(d);
  else if(type==='reel') html = renderReel(d);
  else if(type==='hot') html = renderHot(d);
  document.getElementById('card-display').innerHTML = html;
}

function renderMeme(d){
  const punches = d.punch.map(l=>`<div class="m-punch ${l.c}">${l.t}</div>`).join('');
  return `<div class="meme-card">
    <div class="m-glow1"></div><div class="m-glow2"></div><div class="m-grid"></div><div class="m-accent"></div>
    <div class="m-tag">${d.tag}</div>
    <div class="m-body">
      <div class="m-setup">${d.setup}</div>
      <div>${punches}</div>
    </div>
    <div class="m-foot">
      <div class="m-handle">@geodm.us</div>
      <div class="m-brand">GEODMus</div>
    </div>
  </div>`;
}

function renderInfo(d){
  const bars = d.bars.map(b=>`<div class="bar-row">
    <div class="bar-lbl">${b.l}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${b.p}%;background:${b.c}"><span class="bar-pct">${b.p}%</span></div></div>
  </div>`).join('');
  return `<div class="info-card">
    <div class="i-accent" style="background:${d.cyan?'#00c8d4':'#cc2d8f'}"></div>
    <div class="i-glow"></div>
    <div class="i-cat" style="color:${d.cyan?'#00c8d4':'#cc2d8f'}">${d.cat}</div>
    <div class="i-title">${d.title}</div>
    <div class="i-chart">${bars}</div>
    <div class="i-foot">
      <div class="i-src">Source: ${d.src}</div>
      <div class="i-brand">GEODMus</div>
    </div>
  </div>`;
}

function renderReel(d){
  const hook = d.hook.map(l=>`<div class="r-hook ${l.c}">${l.t}</div>`).join('');
  return `<div style="display:flex;justify-content:center">
    <div class="reel-card">
      <div class="r-bg"></div><div class="r-scan"></div><div class="r-side"></div>
      <div>
        <div class="r-ep"><div class="r-dot"></div>${d.ep}</div>
        <div class="r-ser">${d.ser}</div>
        <div>${hook}</div>
        <div class="r-sub" style="margin-top:4%">${d.sub}</div>
      </div>
      <div class="r-mid"><div class="r-emi">${d.emi}</div><div class="r-badge">${d.bdg}</div></div>
      <div>
        <div class="r-cta">${d.cta}</div>
        <div class="r-foot"><div class="r-handle">@geodm.us</div><div class="r-brand">GEODMus</div></div>
      </div>
    </div>
  </div>`;
}

function renderHot(d){
  const lines = d.lines.map(l=>`<div class="hot-line ${l.c}">${l.t}</div>`).join('');
  return `<div class="hot-card">
    <div class="hot-accent"></div>
    <div class="hot-lines">${lines}</div>
    <div class="hot-divider"></div>
    <div class="hot-tag">${d.tag}</div>
    <div class="hot-brand">GEODMus</div>
  </div>`;
}

function loadCap(type,idx){
  const cap = CAPS[type]?.[idx]||'#GeoDMus #Chicago #DigitalMarketing';
  document.getElementById('cap-text').value = cap;
  updateChars();
}

function setPtags(pl){
  const ptags = document.getElementById('ptags');
  ptags.innerHTML = (pl||[]).map(p=>{
    if(p==='IG') return '<span class="ptag ig">📸 Instagram</span>';
    if(p==='X') return '<span class="ptag x">🐦 X / Twitter</span>';
    return '';
  }).join('');
}

function updateChars(){
  const len = document.getElementById('cap-text').value.length;
  document.getElementById('char-count').textContent = len+' chars';
}

function updateProgress(){
  const count = Object.values(done).filter(Boolean).length;
  const pct = Math.round((count/30)*100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-text').textContent = `${count}/30 posted`;
}

function copyCaption(){
  const text = document.getElementById('cap-text').value;
  if(!text.trim()){showToast('No caption to copy!');return;}
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✅ Copied!';
    btn.classList.add('done');
    showToast('Caption copied! Paste into Metricool.');
    setTimeout(()=>{btn.textContent='📋 Copy Caption';btn.classList.remove('done');},2000);
  }).catch(()=>{
    document.getElementById('cap-text').select();
    showToast('Select all text and copy manually');
  });
}

function openMetricool(){
  window.open('https://app.metricool.com','_blank');
}

function markDone(){
  if(!curSel||!curSel.day) return;
  done[curSel.day] = !done[curSel.day];
  saveDone();
  updateProgress();
  buildSidebar();
  showToast(done[curSel.day]?'✅ Marked as posted!':'Unmarked');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// INIT
// Tab click delegation
document.getElementById('nav').addEventListener('click', function(ev){
  var btn = ev.target.closest('[data-tab]');
  if(!btn) return;
  var tab = btn.dataset.tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  btn.classList.add('on');
  curTab = tab;
  buildSidebar();
  if(tab !== 'cal') showFirst(tab);
  else clearCard();
});
buildSidebar();
updateProgress();
</script>
